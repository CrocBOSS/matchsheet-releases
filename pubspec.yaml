name: match_sheet
description: Flutter app for processing and displaying match sheet documents.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  docx_to_text: ^1.0.1
  path_provider: ^2.1.0
  file_picker: ^10.3.10
  shared_preferences: ^2.2.0
  share_plus: ^12.0.1
  uuid: ^4.0.0
  excel: ^4.0.6
  http: ^1.2.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.1
  dio: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
